<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Music Control</title>
  <meta name="description" content="Panel para sincronizar playlists y ver canciones añadidas." />
  <style>
    :root{
      --bg1:#070712;
      --bg2:#0b1026;
      --glass: rgba(255,255,255,.08);
      --txt: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --ok: rgba(120,255,180,.95);
      --warn: rgba(255,220,120,.95);
      --bad: rgba(255,120,140,.95);
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --ring: 0 0 0 10px rgba(255,255,255,.06);
      --unai: rgba(170, 90, 255, .35);
      --june: rgba(0, 220, 255, .28);
    }

    *{ box-sizing:border-box; }
    html,body{ min-height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--txt);
      background:
        radial-gradient(1200px 900px at 20% 25%, rgba(170, 90, 255, .25), transparent 55%),
        radial-gradient(900px 700px at 80% 35%, rgba(0, 220, 255, .18), transparent 55%),
        radial-gradient(1000px 800px at 50% 80%, rgba(0, 255, 170, .12), transparent 55%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }

    .wave, .wave2{
      position:fixed;
      pointer-events:none;
      filter: blur(18px);
      opacity:.45;
      z-index:0;
    }
    .wave{
      inset:-30vh -20vw auto -20vw;
      height:70vh;
      transform: rotate(-8deg);
      background:
        radial-gradient(closest-side, rgba(255,255,255,.06), transparent 65%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 2px, transparent 2px 18px);
    }
    .wave2{
      inset:auto -30vw -35vh -30vw;
      height:80vh;
      transform: rotate(10deg);
      background:
        radial-gradient(closest-side, rgba(255,255,255,.05), transparent 70%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.07) 0 2px, transparent 2px 16px);
    }

    .wrap{
      position:relative;
      z-index:1;
      min-height:100%;
      display:flex;
      justify-content:center;
      padding:20px 16px 32px;
    }

    .card{
      width:min(560px, 100%);
      border-radius:28px;
      background: linear-gradient(180deg, var(--glass), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      padding:24px 20px 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:16px;
    }
    .brand{ display:flex; align-items:center; gap:12px; min-width:0; }
    .logo{
      width:38px; height:38px;
      border-radius:14px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.25), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.16);
      display:grid;
      place-items:center;
    }
    .title b{
      font-size:14px;
      letter-spacing:.10em;
      text-transform:uppercase;
    }
    .title span{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }

    .chip{
      font-size:12px;
      color: rgba(255,255,255,.78);
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      padding:8px 10px;
      border-radius:999px;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .dot{
      width:8px; height:8px;
      border-radius:50%;
      background: rgba(255,255,255,.35);
      box-shadow: 0 0 0 6px rgba(255,255,255,.05);
    }

    .actions{
      display:grid;
      gap:10px;
      margin-bottom:14px;
    }

    .btn{
      width:100%;
      min-height:56px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(120px 120px at 30% 25%, rgba(255,255,255,.25), transparent 55%),
        linear-gradient(135deg, rgba(170, 90, 255, .35), rgba(0, 220, 255, .22), rgba(0, 255, 170, .18));
      box-shadow: var(--shadow), var(--ring);
      color:var(--txt);
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition: transform .12s ease, opacity .12s ease;
    }
    .btn:active{ transform: scale(.98); }
    .btn[disabled]{ cursor:not-allowed; opacity:.75; }
    .btn.secondary{
      min-height:44px;
      font-size:13px;
      font-weight:600;
      background: rgba(255,255,255,.06);
      box-shadow:none;
    }

    .status{
      padding:12px 14px;
      border-radius:16px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      margin-bottom:18px;
    }
    .status.ok{ color: rgba(220,255,235,.9); border-color: rgba(120,255,180,.25); }
    .status.warn{ color: rgba(255,245,220,.9); border-color: rgba(255,220,120,.25); }
    .status.bad{ color: rgba(255,225,230,.92); border-color: rgba(255,120,140,.22); }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .section-head h2{
      margin:0;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,.82);
    }
    .count-badge{
      font-size:12px;
      color:var(--muted);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      padding:4px 10px;
      border-radius:999px;
    }

    .song-list{
      display:grid;
      gap:10px;
      max-height:min(52vh, 520px);
      overflow:auto;
      padding-right:2px;
    }
    .song-list.empty{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:120px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
      border:1px dashed rgba(255,255,255,.12);
      border-radius:18px;
      background:rgba(0,0,0,.12);
    }

    .song{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px 12px;
      padding:14px;
      border-radius:18px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
    }
    .song-title{
      font-size:14px;
      font-weight:700;
      line-height:1.3;
      margin:0;
    }
    .song-artist{
      font-size:12px;
      color:var(--muted);
      margin:4px 0 0;
    }
    .song-meta{
      grid-column:1 / -1;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      font-size:11px;
      color:rgba(255,255,255,.55);
    }
    .user-badge{
      padding:4px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      letter-spacing:.03em;
      border:1px solid rgba(255,255,255,.14);
      white-space:nowrap;
      align-self:start;
    }
    .user-badge.unai{ background:var(--unai); }
    .user-badge.june{ background:var(--june); }
    .user-badge.other{ background:rgba(255,255,255,.08); }

    .footer{
      margin-top:14px;
      font-size:12px;
      color:rgba(255,255,255,.55);
    }
  </style>
</head>

<body>
  <div class="wave"></div>
  <div class="wave2"></div>

  <div class="wrap">
    <main class="card" role="main">
      <div class="top">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M9 18V6l12-2v12" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <circle cx="7" cy="18" r="3" stroke="white" stroke-width="2"/>
              <circle cx="19" cy="16" r="3" stroke="white" stroke-width="2"/>
            </svg>
          </div>
          <div class="title">
            <b>Music Control</b>
            <span>Sincroniza y consulta la playlist</span>
          </div>
        </div>
        <div class="chip">
          <span class="dot" id="dot"></span>
          <span id="chipText">Listo</span>
        </div>
      </div>

      <div class="actions">
        <button id="runBtn" class="btn" type="button">Sincronizar playlist</button>
        <button id="refreshBtn" class="btn secondary" type="button">Actualizar lista</button>
      </div>

      <div id="status" class="status" aria-live="polite">
        <strong>Estado:</strong> cargando canciones…
      </div>

      <div class="section-head">
        <h2>Canciones añadidas</h2>
        <span id="songCount" class="count-badge">0 canciones</span>
      </div>

      <div id="songList" class="song-list empty">Cargando…</div>

      <div class="footer">Las canciones se registran cuando el sync las copia de una cuenta a otra.</div>
    </main>
  </div>

  <script>
    const LAMBDA_URL = "https://vqgm2vub2zdeu3xjbhoo54oj6e0itdfj.lambda-url.eu-north-1.on.aws/";
    const CLIENT_TOKEN = "";

    const runBtn = document.getElementById("runBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusEl = document.getElementById("status");
    const songListEl = document.getElementById("songList");
    const songCountEl = document.getElementById("songCount");
    const dot = document.getElementById("dot");
    const chipText = document.getElementById("chipText");

    function setChip(state, text){
      chipText.textContent = text;
      const styles = {
        ok: ["rgba(120,255,180,.9)", "0 0 0 6px rgba(120,255,180,.12)"],
        run: ["rgba(255,220,120,.9)", "0 0 0 6px rgba(255,220,120,.12)"],
        bad: ["rgba(255,120,140,.9)", "0 0 0 6px rgba(255,120,140,.12)"],
        idle: ["rgba(255,255,255,.35)", "0 0 0 6px rgba(255,255,255,.05)"],
      };
      const [bg, shadow] = styles[state] || styles.idle;
      dot.style.background = bg;
      dot.style.boxShadow = shadow;
    }

    function setStatus(kind, html){
      statusEl.classList.remove("ok","warn","bad");
      if(kind) statusEl.classList.add(kind);
      statusEl.innerHTML = html;
    }

    function buildHeaders(method){
      const headers = {};
      if(method !== "GET") headers["Content-Type"] = "application/json";
      if(CLIENT_TOKEN) headers["X-Client-Token"] = CLIENT_TOKEN;
      return headers;
    }

    function formatDate(iso){
      if(!iso) return "—";
      const d = new Date(iso);
      if(Number.isNaN(d.getTime())) return iso;
      return d.toLocaleString("es-ES", {
        day:"2-digit", month:"short", year:"numeric",
        hour:"2-digit", minute:"2-digit"
      });
    }

    function userBadgeClass(name){
      const n = (name || "").toLowerCase();
      if(n.includes("unai")) return "unai";
      if(n.includes("june")) return "june";
      return "other";
    }

    function escapeHtml(text){
      return String(text ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }

    function renderSongs(songs){
      songCountEl.textContent = `${songs.length} canción${songs.length === 1 ? "" : "es"}`;

      if(!songs.length){
        songListEl.className = "song-list empty";
        songListEl.textContent = "Todavía no hay canciones registradas.";
        return;
      }

      songListEl.className = "song-list";
      songListEl.innerHTML = songs.map(song => {
        const user = song.insertedBy || "Desconocido";
        const badgeClass = userBadgeClass(user);
        return `
          <article class="song">
            <div>
              <p class="song-title">${escapeHtml(song.title || "Sin título")}</p>
              <p class="song-artist">${escapeHtml(song.artist || "Artista desconocido")}</p>
            </div>
            <span class="user-badge ${badgeClass}">${escapeHtml(user)}</span>
            <div class="song-meta">
              <span>Añadida: ${formatDate(song.insertedAt)}</span>
              ${song.updatedAt && song.updatedAt !== song.insertedAt
                ? `<span>· Actualizada: ${formatDate(song.updatedAt)}</span>`
                : ""}
            </div>
          </article>
        `;
      }).join("");
    }

    function fetchHelpMessage(err){
      if(location.protocol === "file:"){
        return "<br><br><strong>Causa probable:</strong> has abierto el HTML como archivo local (<code>file://</code>). "
          + "El navegador bloquea las peticiones. Súbelo al blob/S3 o prueba con "
          + "<code>python -m http.server 8080</code> y abre <code>http://localhost:8080/front.html</code>.";
      }
      if(String(err).includes("Failed to fetch")){
        return "<br><br><strong>Revisa:</strong><br>"
          + "1) CORS de la Function URL (GET y POST, origin <code>*</code>)<br>"
          + "2) Que la Lambda desplegada tenga el handler con GET<br>"
          + "3) Prueba abrir la URL de Lambda en el navegador:<br>"
          + `<a href="${LAMBDA_URL}" target="_blank" rel="noopener">${escapeHtml(LAMBDA_URL)}</a>`;
      }
      return "";
    }

    async function parseJsonResponse(res){
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        throw new Error(`Respuesta no JSON (${res.status}): ${text.slice(0, 200)}`);
      }
    }

    async function fetchSongs(){
      if(!LAMBDA_URL){
        setChip("bad","Configurar");
        setStatus("bad", "<strong>Error:</strong> falta <code>LAMBDA_URL</code>.");
        return;
      }

      if(location.protocol === "file:"){
        setChip("bad","file://");
        setStatus("bad",
          "<strong>No funciona abriendo el archivo directamente.</strong> "
          + "Sirve el HTML por HTTP (S3, blob o <code>python -m http.server</code>)."
        );
        songListEl.className = "song-list empty";
        songListEl.textContent = "Abre el front desde una URL http(s), no como archivo local.";
        return;
      }

      refreshBtn.disabled = true;
      setChip("run","Cargando");

      try{
        const res = await fetch(LAMBDA_URL, {
          method: "GET",
          mode: "cors",
          headers: buildHeaders("GET"),
        });

        const data = await parseJsonResponse(res);

        if(!res.ok || !data.ok){
          throw new Error(data.error || `HTTP ${res.status}`);
        }

        renderSongs(data.songs || []);
        setChip("ok","Actualizado");
        setStatus("ok", `<strong>Lista cargada.</strong> ${data.count || 0} canciones en la base de datos.`);
      }catch(err){
        setChip("bad","Error");
        setStatus("bad",
          `<strong>No se pudo cargar la lista.</strong><br><code>${escapeHtml(String(err))}</code>`
          + fetchHelpMessage(err)
        );
        songListEl.className = "song-list empty";
        songListEl.textContent = "Error al cargar canciones.";
      }finally{
        refreshBtn.disabled = false;
      }
    }

    async function runSync(){
      runBtn.disabled = true;
      refreshBtn.disabled = true;
      runBtn.textContent = "Sincronizando…";
      setChip("run","Sincronizando");
      setStatus("warn", "<strong>Estado:</strong> ejecutando sync en Lambda…");

      const t0 = performance.now();

      try{
        const res = await fetch(LAMBDA_URL, {
          method: "POST",
          mode: "cors",
          headers: buildHeaders("POST"),
          body: JSON.stringify({ source: "music-control-web", ts: new Date().toISOString() }),
        });

        const data = await parseJsonResponse(res);
        const ms = Math.round(performance.now() - t0);

        if(!res.ok || !data.ok){
          throw new Error(data.error || `HTTP ${res.status}`);
        }

        setChip("ok","OK");
        setStatus("ok", `<strong>Sync completado</strong> en ${ms} ms. Recargando lista…`);
        await fetchSongs();
      }catch(err){
        setChip("bad","Error");
        setStatus("bad",
          `<strong>Fallo en el sync.</strong><br><code>${escapeHtml(String(err))}</code>`
          + fetchHelpMessage(err)
        );
      }finally{
        runBtn.disabled = false;
        refreshBtn.disabled = false;
        runBtn.textContent = "Sincronizar playlist";
      }
    }

    runBtn.addEventListener("click", runSync);
    refreshBtn.addEventListener("click", fetchSongs);
    fetchSongs();
  </script>
</body>
</html>
